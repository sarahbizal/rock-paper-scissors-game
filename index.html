<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rock Paper Scissors Game</title>
    </head>
    <body>
        <h1>Rock Paper Scissors Game</h1>
        <p>First player to hit 5 points wins</p>
        <div id="container">
            <button type="button" id="rock" class="choice">Rock</button>
            <button type="button" id="paper" class="choice">Paper</button>
            <button type="button" id="scissors" class="choice">Scissors</button>
        </div>
        <div id="results">
            <p id="roundWinner"></p>
            <p id="userCount">User:</p>
            <p id="computerCount">Computer:</p>
            <p id="gameWinner">Winner:</p>
        </div>
    </body>
    <script src="script.js"></script>
</html>
